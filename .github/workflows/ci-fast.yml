name: CI Fast

on:
  push:
    branches:
      - 'feature/**'
      - develop
      - 'release/**'
      - 'hotfix/**'
      - main
  pull_request:
    branches:
      - 'feature/**'
      - develop
      - 'release/**'
      - 'hotfix/**'
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Check PHP syntax (src + tests)
        run: find src tests -name "*.php" -print0 | xargs -0 -n1 php -l

  unit-tests:
    name: Unit Tests (no DB)
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_SECRET: ci-unit-test-secret-placeholder-not-used-in-prod
      MAILER_DSN: "null://null"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, zip, gd
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Unit Tests
        run: vendor/bin/phpunit --testsuite "Unit Tests" --no-coverage

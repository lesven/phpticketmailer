name: CI Integration

on:
  push:
    branches:
      - develop
      - 'release/**'
      - 'hotfix/**'
      - main
  pull_request:
    branches:
      - develop
      - 'release/**'
      - 'hotfix/**'
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  static-analysis:
    name: PHP Syntax Check (Static Analysis)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: PHP syntax check (src + tests)
        run: find src tests -name "*.php" -print0 | xargs -0 -n1 php -l

  integration-tests:
    name: Integration Tests & Coverage
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_SECRET: ${{ secrets.CI_APP_SECRET }}
      DATABASE_URL: "mysql://ticketuser:ci_password@127.0.0.1:3306/ticket_mailer_db?serverVersion=10.11.2&charset=utf8mb4"
      MAILER_DSN: "null://null"
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: ticket_mailer_db
          MYSQL_USER: ticketuser
          MYSQL_PASSWORD: ci_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, intl, zip, gd
          coverage: pcov

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Doctrine migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run Integration Tests with Coverage
        run: |
          mkdir -p var/coverage
          vendor/bin/phpunit --testsuite "Unit and Integration Tests" \
            --coverage-html var/coverage/html \
            --coverage-clover var/coverage/clover.xml

      - name: Run E2E HTTP Tests
        run: vendor/bin/phpunit --testsuite "E2E Tests"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: var/coverage/
          retention-days: 30
